<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>SVG Pro Studio V42 - Management</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        /* CSS Kısmı (Sidebar ve Layout ayarları) */
        :root{--accent:#10b981;--bg:#0f172a;--panel:#1e293b;--border:#334155;}
        body{margin:0; background:var(--bg); color:#fff; font-family:sans-serif; display:flex; height:100vh;}
        #sidebar{width:400px; background:var(--panel); border-right:1px solid var(--border); overflow-y:auto; padding:20px; box-sizing:border-box;}
        #preview-area{flex:1; background:#000; display:flex; align-items:center; justify-content:center; position:relative;}
        .group-box{background:rgba(0,0,0,0.2); padding:15px; border-radius:10px; border:1px solid var(--border); margin-bottom:20px;}
        .label-text{font-size:11px; color:#94a3b8; font-weight:700; text-transform:uppercase; display:block; margin-bottom:5px;}
        input, select{width:100%; padding:10px; border-radius:8px; border:1px solid var(--border); background:#000; color:#fff; margin-bottom:10px; box-sizing:border-box;}
        .action-btn{background:var(--accent); color:#fff; border:none; border-radius:8px; padding:12px; cursor:pointer; font-weight:700; width:100%; transition:0.2s;}
        .action-btn.danger{background:#ef4444;}
    </style>
</head>
<body>

<div id="sidebar">
    <h2 style="color:var(--accent); display:flex; align-items:center; gap:10px;"><i class="ph ph-shield-check"></i> Management V42</h2>
    
    <div class="group-box">
        <span class="label-text">YAYIN DOSYASI SEÇ</span>
        <select id="file-selector" onchange="loadCurrentSlide()">
            <option value="slayt.svg">Ana Slayt (slayt.svg)</option>
            <option value="kampanya.svg">Kampanya (kampanya.svg)</option>
            <option value="duyuru.svg">Duyuru (duyuru.svg)</option>
        </select>
        <button class="action-btn" onclick="saveSVG()"><i class="ph ph-floppy-disk"></i> SVG TASARIMI KAYDET</button>
    </div>

    <div class="group-box" style="border-color:#3b82f6;">
        <span class="label-text" style="color:#3b82f6;">SOL EKRAN (CANLI YAYIN)</span>
        <input type="text" id="m3u8-url" placeholder="M3U8 Linki">
        <div style="display:flex; gap:10px;">
            <input type="number" id="m3u8-w" placeholder="W (vw)">
            <input type="number" id="m3u8-h" placeholder="H (vw)">
        </div>
        <button id="btn-left-toggle" class="action-btn" onclick="toggleMini('left')" style="background:#475569;">GİZLİ</button>
    </div>

    <div class="group-box" style="border-color:#f59e0b;">
        <span class="label-text" style="color:#f59e0b;">SAĞ EKRAN (RESİM LİSTESİ)</span>
        <textarea id="right-images" rows="3" placeholder="Resim dosyalarını virgülle ayır: resim1.jpg, resim2.jpg"></textarea>
        <div style="display:flex; gap:10px;">
            <input type="number" id="right-w" placeholder="W (vw)">
            <input type="number" id="right-h" placeholder="H (vw)">
        </div>
        <button id="btn-right-toggle" class="action-btn" onclick="toggleMini('right')" style="background:#475569;">GİZLİ</button>
    </div>

    <button class="action-btn" style="background:#3b82f6; height:60px;" onclick="saveSettingsJSON()">
        <i class="ph ph-cloud-arrow-up"></i> TÜM AYARLARI (JSON) GÜNCELLE
    </button>
</div>

<div id="preview-area">
    <div id="canvas-render">SVG ÖNİZLEME YÜKLENİYOR...</div>
</div>

<script>
    const WORKER_URL = "https://tvinfoeditor.tafbilgiislem.workers.dev";
    let SESSION_PASS = "ŞİFRENİZ"; // Buraya şifreni gömebilirsin
    let fullSettings = null;
    let settingsSha = "";

    async function initEditor() {
        // İlk olarak settings.json'u çek
        const res = await fetch(WORKER_URL, { headers: {"X-Auth-Key": SESSION_PASS, "X-File-Name": "settings.json"} });
        const data = await res.json();
        fullSettings = JSON.parse(decodeURIComponent(escape(atob(data.content))));
        settingsSha = data.sha;
        
        // UI'yı doldur
        document.getElementById('m3u8-url').value = fullSettings.mini_screens.left.url;
        document.getElementById('m3u8-w').value = fullSettings.mini_screens.left.w;
        document.getElementById('m3u8-h').value = fullSettings.mini_screens.left.h;
        document.getElementById('right-images').value = fullSettings.mini_screens.right.images.join(', ');
        document.getElementById('right-w').value = fullSettings.mini_screens.right.w;
        document.getElementById('right-h').value = fullSettings.mini_screens.right.h;
        updateButtons();
    }

    function toggleMini(side) {
        fullSettings.mini_screens[side].visible = !fullSettings.mini_screens[side].visible;
        updateButtons();
    }

    function updateButtons() {
        const bl = document.getElementById('btn-left-toggle');
        bl.innerText = fullSettings.mini_screens.left.visible ? "GÖSTERİLİYOR" : "GİZLİ";
        bl.style.background = fullSettings.mini_screens.left.visible ? "#10b981" : "#475569";

        const br = document.getElementById('btn-right-toggle');
        br.innerText = fullSettings.mini_screens.right.visible ? "GÖSTERİLİYOR" : "GİZLİ";
        br.style.background = fullSettings.mini_screens.right.visible ? "#10b981" : "#475569";
    }

    async function saveSettingsJSON() {
        // Form verilerini objeye aktar
        fullSettings.mini_screens.left.url = document.getElementById('m3u8-url').value;
        fullSettings.mini_screens.left.w = parseInt(document.getElementById('m3u8-w').value);
        fullSettings.mini_screens.left.h = parseInt(document.getElementById('m3u8-h').value);
        fullSettings.mini_screens.right.images = document.getElementById('right-images').value.split(',').map(s => s.trim());
        fullSettings.mini_screens.right.w = parseInt(document.getElementById('right-w').value);
        fullSettings.mini_screens.right.h = parseInt(document.getElementById('right-h').value);

        const b64 = btoa(unescape(encodeURIComponent(JSON.stringify(fullSettings, null, 2))));
        const res = await fetch(WORKER_URL, {
            method: "PUT",
            headers: { "X-Auth-Key": SESSION_PASS, "X-File-Name": "settings.json" },
            body: JSON.stringify({content: b64, sha: settingsSha})
        });
        if(res.ok) alert("Ayarlar (JSON) başarıyla güncellendi!");
    }

    window.onload = initEditor;
</script>
</body>
</html>
